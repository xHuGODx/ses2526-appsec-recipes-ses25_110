name: Nightly DAST

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      software_ref:
        description: Git ref do software repo a testar
        required: false
        default: master

jobs:
  restler-deep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SOFTWARE_REPOSITORY: xHuGODx/softwate-baseline-ses25_110
      SOFTWARE_REF: ${{ inputs.software_ref || 'master' }}
      APP_REPO_DIR: ${{ github.workspace }}/app
      APP_COMPOSE_FILE: ${{ github.workspace }}/app/docker-compose.yml
      DAST_ROOT: ${{ github.workspace }}/dast
      COMPOSE_PROJECT_NAME: nightly-dast
      GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
    steps:
      - name: Validar SHARED_TOKEN
        env:
          SHARED_TOKEN: ${{ secrets.SHARED_TOKEN }}
        run: |
          if [ -z "${SHARED_TOKEN}" ]; then
            echo "::error::Missing SHARED_TOKEN secret."
            echo "::error::Create a token with read access to both repositories and store it as SHARED_TOKEN."
            exit 1
          fi

      - name: Checkout appsec repo
        uses: actions/checkout@v4

      - name: Checkout software repo temporariamente
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOFTWARE_REPOSITORY }}
          ref: ${{ env.SOFTWARE_REF }}
          path: app
          token: ${{ secrets.SHARED_TOKEN }}

      - name: Preparar outputs DAST
        run: |
          source "${GITHUB_WORKSPACE}/dast/scripts/common.sh"
          clean_generated
          clean_results
          ensure_dirs

      - name: Arrancar stack da aplicacao
        run: |
          source "${GITHUB_WORKSPACE}/dast/scripts/common.sh"
          start_app_stack

      - name: Esperar pela API
        run: bash ./dast/scripts/wait-for-api.sh

      - name: Esperar pelo frontend
        run: bash ./dast/scripts/wait-for-frontend.sh

      - name: Exportar OpenAPI
        run: bash ./dast/scripts/export-openapi.sh

      - name: Preparar imagem RESTler
        run: bash ./dast/scripts/build-restler-image.sh

      - name: Correr RESTler base
        continue-on-error: true
        run: bash ./dast/scripts/run-restler.sh

      - name: Correr RESTler deep
        continue-on-error: true
        run: bash ./dast/scripts/run-restler-deep.sh

      - name: Gerar manifest de findings
        run: python3 ./dast/scripts/build-findings-manifest.py

      - name: Gerar input para LLM
        run: python3 ./dast/scripts/build-llm-analysis-input.py

      - name: Avisar quando GEMINI_KEY estiver ausente
        if: ${{ env.GEMINI_KEY == '' }}
        run: echo "::warning::GEMINI_KEY not set. Skipping Gemini analysis."

      - name: Gerar tabela com Gemini
        if: ${{ env.GEMINI_KEY != '' }}
        continue-on-error: true
        run: python3 ./dast/scripts/run-llm-analysis.py

      - name: Renderizar HTML LLM
        if: ${{ always() && hashFiles('dast/results/llm/findings_table.json') != '' }}
        run: python3 ./dast/scripts/render-llm-report.py

      - name: Avaliar findings e artefactos do nightly
        run: |
          python3 ./dast/scripts/evaluate-findings.py ./dast/results/llm/scan_manifest.json \
            --require-file "${GITHUB_WORKSPACE}/dast/generated/openapi.json" \
            --require-file "${GITHUB_WORKSPACE}/dast/results/restler/Compile/grammar.py" \
            --require-file "${GITHUB_WORKSPACE}/dast/results/restler/Test/ResponseBuckets/runSummary.json" \
            --require-file "${GITHUB_WORKSPACE}/dast/results/restler/FuzzLean/ResponseBuckets/runSummary.json" \
            --require-file "${GITHUB_WORKSPACE}/dast/results/restler/Fuzz/ResponseBuckets/runSummary.json" \
            --require-file "${GITHUB_WORKSPACE}/dast/results/llm/analysis_input.json"

      - name: Publicar artefactos DAST
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-dast-results
          path: |
            dast/generated
            dast/results
          retention-days: 14

      - name: Parar stack da aplicacao
        if: always()
        run: |
          source "${GITHUB_WORKSPACE}/dast/scripts/common.sh"
          stop_app_stack

      - name: Descartar checkout temporario da app
        if: always()
        run: rm -rf "${GITHUB_WORKSPACE}/app"
