name: Nightly DAST

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      software_ref:
        description: Git ref of the software repo to test
        required: false
        default: master

jobs:
  nightly-dast:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SOFTWARE_REPOSITORY: xHuGODx/softwate-baseline-ses25_110
      SOFTWARE_REF: ${{ inputs.software_ref || 'master' }}
      APP_REPO_DIR: ${{ github.workspace }}/app
      APP_COMPOSE_FILE: ${{ github.workspace }}/app/docker-compose.yml
      DAST_ROOT: ${{ github.workspace }}/dast
      COMPOSE_PROJECT_NAME: nightly-dast
      GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
    steps:
      - name: Validate SHARED_TOKEN
        env:
          SHARED_TOKEN: ${{ secrets.SHARED_TOKEN }}
        run: |
          if [ -z "${SHARED_TOKEN}" ]; then
            echo "::error::Missing SHARED_TOKEN secret."
            echo "::error::Create a token with read access to both repositories and store it as SHARED_TOKEN."
            exit 1
          fi

      - name: Checkout appsec repo
        uses: actions/checkout@v4

      - name: Checkout software repo temporarily
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOFTWARE_REPOSITORY }}
          ref: ${{ env.SOFTWARE_REF }}
          path: app
          token: ${{ secrets.SHARED_TOKEN }}

      - name: Prepare DAST outputs
        run: |
          source "${GITHUB_WORKSPACE}/dast/scripts/common.sh"
          clean_generated
          clean_results
          ensure_dirs

      - name: Start application stack
        run: |
          source "${GITHUB_WORKSPACE}/dast/scripts/common.sh"
          start_app_stack

      - name: Wait for API
        run: bash ./dast/scripts/wait-for-api.sh

      - name: Wait for frontend
        run: bash ./dast/scripts/wait-for-frontend.sh

      - name: Export OpenAPI
        run: bash ./dast/scripts/export-openapi.sh

      - name: Prepare Schemathesis image
        run: bash ./dast/scripts/build-schemathesis-image.sh

      - name: Run ZAP
        continue-on-error: true
        run: bash ./dast/scripts/run-zap.sh

      - name: Run Schemathesis
        continue-on-error: true
        run: bash ./dast/scripts/run-schemathesis.sh

      - name: Build findings manifest
        run: python3 ./dast/scripts/build-findings-manifest.py

      - name: Build LLM analysis input
        run: python3 ./dast/scripts/build-llm-analysis-input.py

      - name: Warn when GEMINI_KEY is missing
        if: ${{ env.GEMINI_KEY == '' }}
        run: echo "::warning::GEMINI_KEY is not set. Skipping Gemini analysis."

      - name: Generate findings table with Gemini
        if: ${{ env.GEMINI_KEY != '' }}
        continue-on-error: true
        run: python3 ./dast/scripts/run-llm-analysis.py

      - name: Render LLM HTML report
        if: ${{ always() && hashFiles('dast/results/llm/findings_table.json') != '' }}
        run: python3 ./dast/scripts/render-llm-report.py

      - name: Evaluate nightly findings and required artifacts
        run: |
          python3 ./dast/scripts/evaluate-findings.py ./dast/results/llm/scan_manifest.json \
            --require-file "${GITHUB_WORKSPACE}/dast/generated/openapi.json" \
            --require-file "${GITHUB_WORKSPACE}/dast/results/zap/api/report.json" \
            --require-file "${GITHUB_WORKSPACE}/dast/results/zap/frontend/report.json" \
            --require-file "${GITHUB_WORKSPACE}/dast/results/schemathesis/junit.xml" \
            --require-file "${GITHUB_WORKSPACE}/dast/results/llm/analysis_input.json"

      - name: Upload DAST artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-dast-results
          path: |
            dast/generated
            dast/results
          retention-days: 14

      - name: Stop application stack
        if: always()
        run: |
          source "${GITHUB_WORKSPACE}/dast/scripts/common.sh"
          stop_app_stack

      - name: Remove temporary application checkout
        if: always()
        run: rm -rf "${GITHUB_WORKSPACE}/app"
